<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>QR Logo Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f5ef;
        font-family: Arial, Helvetica, sans-serif;
      }

      .card {
        display: grid;
        gap: 28px;
        justify-items: center;
        padding: 42px;
        border-radius: 28px;
        background: white;
        box-shadow: 0 24px 60px rgba(7, 22, 49, 0.12);
      }

      .logo {
        width: 190px;
        height: 190px;
      }

      .caption {
        color: #41506c;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="./logo-methode-secondaire-qr.svg" alt="Methode Secondaire QR logo" />
      <div class="caption">Transparent navy version for QR code insertion</div>
    </div>
  </body>
</html>
